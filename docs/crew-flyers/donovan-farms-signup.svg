<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="850" height="1100" viewBox="0 0 850 1100" font-family="Helvetica, Arial, sans-serif">
  <rect width="850" height="1100" fill="#ffffff"/>
  <rect x="20" y="20" width="810" height="1060" rx="24" fill="none" stroke="#16a34a" stroke-width="4"/>

  <!-- Header -->
  <text x="425" y="120" text-anchor="middle" font-size="40">👷</text>
  <text x="425" y="180" text-anchor="middle" font-size="46" font-weight="bold" fill="#111827">JOIN THE CREW</text>
  <text x="425" y="232" text-anchor="middle" font-size="30" font-weight="bold" fill="#16a34a">DONOVAN FARMS INC</text>
  <text x="425" y="290" text-anchor="middle" font-size="22" fill="#6b7280">Scan to make your time-clock account</text>

  <!-- QR (embedded PNG with 4-module quiet zone) -->
  <rect x="209" y="334" width="432" height="432" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <image x="225" y="350" width="400" height="400" href="data:image/png;base64," />

  <!-- Steps -->
  <text x="425" y="830" text-anchor="middle" font-size="22" fill="#374151">
    <tspan font-weight="bold">1.</tspan> Open your phone camera
    <tspan dx="18" font-weight="bold">2.</tspan> Point at the code
    <tspan dx="18" font-weight="bold">3.</tspan> Tap the link
  </text>
  <text x="425" y="870" text-anchor="middle" font-size="22" fill="#374151">
    Enter your name, email &amp; a password. That's it — you're on the clock.
  </text>

  <!-- Fallback URL + code -->
  <text x="425" y="950" text-anchor="middle" font-size="18" fill="#6b7280">Can't scan? Go to:</text>
  <text x="425" y="978" text-anchor="middle" font-size="20" font-weight="bold" fill="#2563eb">https://accounting.business-builder.online/crew/signup</text>
  <text x="425" y="1016" text-anchor="middle" font-size="18" fill="#6b7280">and enter invite code:</text>
  <text x="425" y="1046" text-anchor="middle" font-size="26" font-weight="bold" fill="#111827" font-family="monospace">donovan-crew-85d89b02</text>
</svg>
